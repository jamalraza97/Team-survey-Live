<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队协作匿名评估问卷</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#1a1a2e;min-height:100vh}
  .shell{max-width:680px;margin:0 auto;padding:24px 16px 60px}
  .site-header{background:#fff;border-bottom:1px solid #e8eaf0;padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:14px;font-weight:600;color:#2563eb}
  .anon-badge{font-size:11px;color:#6b7280;background:#f3f4f6;padding:3px 8px;border-radius:20px}
  .progress-wrap{background:#fff;padding:12px 20px;border-bottom:1px solid #e8eaf0;position:sticky;top:49px;z-index:99;display:none}
  .progress-bar-bg{height:4px;background:#e8eaf0;border-radius:2px;overflow:hidden}
  .progress-bar-fill{height:100%;background:#2563eb;border-radius:2px;transition:width .4s ease}
  .progress-label{font-size:11px;color:#9ca3af;margin-top:6px}
  .card{background:#fff;border:1px solid #e8eaf0;border-radius:12px;padding:24px;margin-top:20px}
  .card-title{font-size:18px;font-weight:600;color:#111827;margin-bottom:4px}
  .card-sub{font-size:13px;color:#6b7280;margin-bottom:20px}
  .name-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:8px}
  .name-btn{padding:12px 8px;border:1.5px solid #e8eaf0;border-radius:8px;background:#fff;font-size:14px;font-weight:500;color:#374151;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
  .name-btn:hover{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
  .name-btn.selected{border-color:#2563eb;background:#2563eb;color:#fff}
  .scale-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;padding:10px 14px;background:#f8fafc;border-radius:8px;border:1px solid #e8eaf0}
  .scale-item{font-size:12px;color:#4b5563}
  .scale-dot{font-weight:600;color:#2563eb}
  .person-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f3f4f6}
  .avatar{width:42px;height:42px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#1d4ed8;flex-shrink:0}
  .person-info .name{font-size:17px;font-weight:600;color:#111827}
  .person-info .count{font-size:12px;color:#9ca3af}
  .dim-group{margin-bottom:20px}
  .dim-label{font-size:11px;font-weight:600;color:#2563eb;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding:4px 8px;background:#eff6ff;border-radius:4px;display:inline-block}
  .q-row{margin-bottom:14px}
  .q-text{font-size:14px;color:#374151;margin-bottom:8px;line-height:1.5}
  .rating-btns{display:flex;gap:6px}
  .r-btn{width:40px;height:36px;border:1.5px solid #e8eaf0;border-radius:6px;background:#fff;font-size:13px;font-weight:500;color:#6b7280;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:inherit}
  .r-btn:hover{border-color:#93c5fd;color:#1d4ed8}
  .r-btn.sel-1,.r-btn.sel-2{border-color:#fca5a5;background:#fee2e2;color:#991b1b}
  .r-btn.sel-3{border-color:#fcd34d;background:#fef3c7;color:#92400e}
  .r-btn.sel-4,.r-btn.sel-5{border-color:#6ee7b7;background:#d1fae5;color:#065f46}
  .suggestion-wrap{margin-top:16px}
  .suggestion-wrap label{font-size:13px;color:#6b7280;display:block;margin-bottom:6px}
  .suggestion-wrap textarea{width:100%;padding:10px 12px;border:1.5px solid #e8eaf0;border-radius:8px;font-size:13px;color:#374151;resize:vertical;min-height:68px;font-family:inherit;outline:none;transition:border .15s}
  .suggestion-wrap textarea:focus{border-color:#93c5fd}
  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
  .btn-back{padding:10px 20px;border:1.5px solid #e8eaf0;border-radius:8px;background:#fff;font-size:14px;color:#6b7280;cursor:pointer;font-family:inherit}
  .btn-next{padding:10px 28px;border:none;border-radius:8px;background:#2563eb;font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit}
  .btn-next:disabled{background:#9ca3af;cursor:not-allowed}
  .btn-submit{padding:12px 32px;border:none;border-radius:8px;background:#059669;font-size:15px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit}
  .btn-submit:disabled{background:#9ca3af;cursor:not-allowed}
  .thanks-card{text-align:center;padding:48px 24px}
  .thanks-icon{font-size:48px;margin-bottom:16px}
  .thanks-title{font-size:22px;font-weight:700;color:#111827;margin-bottom:8px}
  .thanks-sub{font-size:15px;color:#6b7280;line-height:1.6}
  .warn{font-size:12px;color:#dc2626;margin-top:8px}
  .intro-card{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1px solid #dbeafe;border-radius:12px;padding:20px 24px;margin-top:16px}
  .intro-card h2{font-size:17px;font-weight:700;color:#1e40af;margin-bottom:8px}
  .intro-card p{font-size:13px;color:#374151;line-height:1.65}
  @media(max-width:480px){.name-grid{grid-template-columns:1fr 1fr}.r-btn{width:36px;height:34px;font-size:12px}}
</style>
</head>
<body>

<!-- Netlify Forms detection — DO NOT REMOVE THIS HIDDEN FORM -->
<form name="peer-survey" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input name="bot-field" type="hidden">
  <input name="ratings" type="hidden">
  <input name="suggestions" type="hidden">
</form>

<header class="site-header">
  <span class="logo">📋 团队协作评估</span>
  <span class="anon-badge">🔒 完全匿名</span>
</header>

<div id="progress-wrap" class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-label" id="prog-label"></div>
</div>

<div class="shell">
  <div id="screen-select">
    <div class="intro-card">
      <h2>本问卷用于团队协作匿名评估</h2>
      <p>您的评分将完全匿名，不会与您的姓名关联。系统将自动隐去您自己的评估模块，您只需为其他5位同事评分。</p>
    </div>
    <div class="card">
      <div class="card-title">请选择您的姓名</div>
      <div class="card-sub">系统将据此隐去您自己的模块，确保评估的准确性。</div>
      <div class="name-grid" id="name-grid"></div>
      <div class="warn" id="select-warn" style="display:none">请先选择您的姓名</div>
      <div style="margin-top:20px">
        <button class="btn-next" onclick="startSurvey()">开始填写 →</button>
      </div>
    </div>
  </div>

  <div id="screen-survey" style="display:none"></div>

  <div id="screen-thanks" style="display:none">
    <div class="card thanks-card">
      <div class="thanks-icon">✅</div>
      <div class="thanks-title">感谢您的参与！</div>
      <div class="thanks-sub">问卷填写完毕，感谢您的匿名反馈。<br>您的评分将帮助团队共同成长。</div>
    </div>
  </div>
</div>

<script>
const MEMBERS=['宋玉仪','周雪梅','郭星星','黄乔珍','吴超','曾淑娴'];
const DIMS=[
  {key:'contrib',   cn:'工作贡献', qs:['能按时完成任务，工作质量符合要求','主动承担工作，无需他人提醒或催促']},
  {key:'collab',    cn:'协作能力', qs:['与团队成员沟通顺畅，表达清晰、尊重他人','出现分歧时，能以专业、建设性的方式处理']},
  {key:'expertise', cn:'专业能力', qs:['对负责的业务领域具备扎实的专业知识','做决策时判断准确、思路清晰']},
  {key:'reliability',cn:'可靠性', qs:['能兑现对团队的承诺，说到做到','及时向团队反馈工作进度及遇到的问题']},
  {key:'climate',   cn:'团队氛围', qs:['为团队营造了积极、尊重的工作氛围','对他人的意见和反馈保持开放态度']},
];

let selfIdx=null, currentModule=0, ratings={}, suggestions={};

const grid=document.getElementById('name-grid');
MEMBERS.forEach((m,i)=>{
  const btn=document.createElement('button');
  btn.className='name-btn'; btn.textContent=m;
  btn.onclick=()=>{document.querySelectorAll('.name-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selfIdx=i;};
  grid.appendChild(btn);
});

function getRatees(){return MEMBERS.filter((_,i)=>i!==selfIdx);}

function startSurvey(){
  if(selfIdx===null){document.getElementById('select-warn').style.display='block';return;}
  if(localStorage.getItem('survey_done_v2')){
    document.getElementById('screen-select').style.display='none';
    document.getElementById('screen-thanks').style.display='block';
    return;
  }
  currentModule=0; ratings={}; suggestions={};
  document.getElementById('screen-select').style.display='none';
  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('screen-survey').style.display='block';
  renderModule();
}

function renderModule(){
  const ratees=getRatees();
  const person=ratees[currentModule];
  const total=ratees.length;
  document.getElementById('prog-fill').style.width=(currentModule/total*100)+'%';
  document.getElementById('prog-label').textContent=`模块 ${currentModule+1} / ${total} — 正在评估：${person}`;
  if(!ratings[person])ratings[person]={};

  let html=`<div class="card">
    <div class="person-header">
      <div class="avatar">${person[0]}</div>
      <div class="person-info"><div class="name">${person}</div><div class="count">第 ${currentModule+1} 位 / 共 ${total} 位</div></div>
    </div>
    <div class="scale-bar">
      <span class="scale-item"><span class="scale-dot">1</span> 几乎从不</span><span style="color:#d1d5db">·</span>
      <span class="scale-item"><span class="scale-dot">2</span> 很少</span><span style="color:#d1d5db">·</span>
      <span class="scale-item"><span class="scale-dot">3</span> 有时</span><span style="color:#d1d5db">·</span>
      <span class="scale-item"><span class="scale-dot">4</span> 经常</span><span style="color:#d1d5db">·</span>
      <span class="scale-item"><span class="scale-dot">5</span> 几乎总是</span>
    </div>`;

  DIMS.forEach(d=>{
    html+=`<div class="dim-group"><span class="dim-label">${d.cn}</span>`;
    d.qs.forEach((q,qi)=>{
      const key=`${d.key}_q${qi+1}`;
      const cur=ratings[person][key]||0;
      html+=`<div class="q-row"><div class="q-text">${person} ${q}</div><div class="rating-btns">`;
      for(let v=1;v<=5;v++){
        html+=`<button class="r-btn ${cur===v?'sel-'+v:''}" onclick="setRating('${person}','${key}',${v},this)">${v}</button>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;
  });

  html+=`<div class="suggestion-wrap">
    <label>选填：请写出一条对 ${person} 的改进建议</label>
    <textarea id="sug-ta" placeholder="您的建议将匿名汇总给管理员...">${suggestions[person]||''}</textarea>
  </div>
  <div class="warn" id="q-warn" style="display:none">请完成所有评分（共10题）后再继续</div>
  <div class="nav-row">
    ${currentModule>0?`<button class="btn-back" onclick="goBack()">← 上一位</button>`:`<div></div>`}
    ${currentModule<ratees.length-1
      ?`<button class="btn-next" onclick="goNext()">下一位 →</button>`
      :`<button class="btn-submit" onclick="submitSurvey()">提交问卷 ✓</button>`}
  </div></div>`;

  document.getElementById('screen-survey').innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function setRating(person,key,val,btn){
  ratings[person][key]=val;
  btn.parentElement.querySelectorAll('.r-btn').forEach((b,i)=>{b.className='r-btn';if(i+1===val)b.classList.add('sel-'+val);});
}

function isComplete(person){
  let c=0;
  DIMS.forEach(d=>d.qs.forEach((_,qi)=>{if(ratings[person]?.[`${d.key}_q${qi+1}`])c++;}));
  return c===10;
}

function saveSuggestion(){
  const ta=document.getElementById('sug-ta');
  if(ta)suggestions[getRatees()[currentModule]]=ta.value;
}

function goNext(){
  saveSuggestion();
  if(!isComplete(getRatees()[currentModule])){document.getElementById('q-warn').style.display='block';return;}
  currentModule++;renderModule();
}

function goBack(){saveSuggestion();currentModule--;renderModule();}

async function submitSurvey(){
  saveSuggestion();
  const person=getRatees()[currentModule];
  if(!isComplete(person)){document.getElementById('q-warn').style.display='block';return;}

  const btn=document.querySelector('.btn-submit');
  btn.disabled=true; btn.textContent='提交中...';

  try{
    const body=new URLSearchParams({
      'form-name':'peer-survey',
      'bot-field':'',
      'ratings':JSON.stringify(ratings),
      'suggestions':JSON.stringify(suggestions)
    });
    const res=await fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
    if(!res.ok)throw new Error('failed');
    localStorage.setItem('survey_done_v2','1');
    document.getElementById('progress-wrap').style.display='none';
    document.getElementById('screen-survey').style.display='none';
    document.getElementById('screen-thanks').style.display='block';
  }catch(e){
    btn.disabled=false; btn.textContent='提交问卷 ✓';
    alert('提交失败，请检查网络连接后重试。');
  }
}
</script>
</body>
</html>

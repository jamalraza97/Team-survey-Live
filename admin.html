<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员报告 — 团队协作评估</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#1a1a2e;min-height:100vh}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{background:#fff;border:1px solid #e8eaf0;border-radius:16px;padding:40px;width:100%;max-width:440px;text-align:center}
  .login-icon{font-size:40px;margin-bottom:16px}
  .login-title{font-size:22px;font-weight:700;color:#111827;margin-bottom:6px}
  .login-sub{font-size:13px;color:#6b7280;margin-bottom:24px;line-height:1.6}
  .login-input{width:100%;padding:12px 14px;border:1.5px solid #e8eaf0;border-radius:8px;font-size:14px;outline:none;font-family:inherit;transition:border .15s;margin-bottom:12px}
  .login-input:focus{border-color:#93c5fd}
  .login-btn{width:100%;padding:12px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px}
  .login-btn:hover{background:#1d4ed8}
  .login-err{font-size:13px;color:#dc2626;margin-top:4px;display:none}
  .how-to{text-align:left;background:#f8fafc;border:1px solid #e8eaf0;border-radius:10px;padding:14px 16px;margin-top:16px;font-size:12px;color:#6b7280;line-height:1.9}
  .how-to strong{color:#374151}
  #dashboard{display:none}
  .top-bar{background:#fff;border-bottom:1px solid #e8eaf0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
  .top-logo{font-size:15px;font-weight:700;color:#111827}
  .top-right{display:flex;gap:10px;align-items:center}
  .stat-chip{font-size:12px;color:#6b7280;background:#f3f4f6;padding:4px 12px;border-radius:20px}
  .refresh-btn{padding:7px 14px;border:1.5px solid #e8eaf0;border-radius:8px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:#374151;font-family:inherit}
  .refresh-btn:hover{border-color:#93c5fd;color:#1d4ed8}
  .shell{max-width:920px;margin:0 auto;padding:24px 16px 60px}
  .section-title{font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
  .overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:28px}
  .ov-card{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:border .15s}
  .ov-card:hover{border-color:#93c5fd}
  .ov-card.active{border-color:#2563eb;box-shadow:0 0 0 3px #dbeafe}
  .ov-avatar{width:36px;height:36px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#1d4ed8;margin:0 auto 8px}
  .ov-name{font-size:13px;font-weight:600;color:#111827;margin-bottom:4px}
  .ov-score{font-size:20px;font-weight:700}
  .ov-label{font-size:10px;color:#9ca3af;margin-top:2px}
  .report-card{background:#fff;border:1px solid #e8eaf0;border-radius:14px;padding:24px;margin-bottom:16px}
  .report-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f3f4f6}
  .rep-avatar{width:50px;height:50px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#1d4ed8;flex-shrink:0}
  .rep-name{font-size:19px;font-weight:700;color:#111827}
  .rep-meta{font-size:12px;color:#9ca3af;margin-top:2px}
  .overall-badge{margin-left:auto;text-align:right;flex-shrink:0}
  .overall-num{font-size:28px;font-weight:700}
  .overall-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;margin-top:3px;display:inline-block}
  .chart-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;margin-bottom:24px}
  .radar-wrap{position:relative;width:100%;max-width:280px;margin:0 auto}
  .dim-scores{display:flex;flex-direction:column;gap:12px}
  .dim-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .dim-cn{font-size:13px;font-weight:600;color:#374151}
  .dim-en{font-size:11px;color:#9ca3af}
  .dim-val{font-size:15px;font-weight:700}
  .bar-bg{height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;position:relative}
  .bar-fill{height:100%;border-radius:3px}
  .dim-interp{font-size:11px;color:#6b7280;margin-top:4px;line-height:1.45}
  .benchmark-note{font-size:11px;color:#9ca3af;margin-top:8px;padding:8px 12px;background:#f9fafb;border-radius:6px;border:1px solid #f3f4f6}
  .sug-section{margin-top:20px;padding-top:16px;border-top:1px solid #f3f4f6}
  .sug-title{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .sug-item{font-size:13px;color:#374151;padding:8px 12px;background:#f8fafc;border-radius:6px;border-left:3px solid #93c5fd;margin-bottom:6px;line-height:1.5}
  .sug-empty{font-size:13px;color:#9ca3af;font-style:italic}
  .no-data{text-align:center;padding:60px;color:#9ca3af;font-size:14px}
  @media(max-width:600px){.chart-section{grid-template-columns:1fr}.overview-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-icon">📊</div>
    <div class="login-title">管理员报告</div>
    <div class="login-sub">输入密码后，将 Netlify 导出的 CSV 粘贴到下方生成报告。</div>
    <input class="login-input" type="password" id="pwd" placeholder="管理员密码" onkeydown="if(event.key==='Enter')checkPwd()"/>
    <button class="login-btn" onclick="checkPwd()">验证密码</button>
    <div class="login-err" id="login-err">密码错误，请重试</div>
    <div class="how-to">
      <strong>如何获取 CSV 数据：</strong><br>
      1. 登录 netlify.com → 找到您的站点<br>
      2. 点击 <strong>Forms</strong> → 点击 <strong>peer-survey</strong><br>
      3. 点击 <strong>Download</strong> 下载 CSV 文件<br>
      4. 用文本编辑器打开 CSV，全选复制内容<br>
      5. 返回此页，粘贴到输入框中
    </div>
  </div>
</div>

<div id="csv-screen" style="display:none">
  <div class="login-wrap">
    <div class="login-card" style="max-width:520px">
      <div class="login-icon">📋</div>
      <div class="login-title">粘贴问卷数据</div>
      <div class="login-sub">将从 Netlify Forms 下载的 CSV 文件内容粘贴到下方</div>
      <textarea id="csv-input" class="login-input" rows="8" placeholder="在此粘贴 CSV 内容..." style="resize:vertical;text-align:left;font-size:12px;font-family:monospace"></textarea>
      <button class="login-btn" onclick="parseAndRender()">生成报告 →</button>
      <div class="login-err" id="csv-err">无法解析数据，请确认粘贴的是正确的 CSV 内容</div>
    </div>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div class="top-bar">
    <div class="top-logo">📊 团队协作评估 — 管理员报告</div>
    <div class="top-right">
      <span class="stat-chip" id="resp-count"></span>
      <button class="refresh-btn" onclick="goBack()">← 重新粘贴数据</button>
      <button class="refresh-btn" onclick="exportCSV()">⬇ 导出 CSV</button>
    </div>
  </div>
  <div class="shell">
    <div id="content"></div>
  </div>
</div>

<script>
const CORRECT_PWD='Jiama2797';
const MEMBERS=['宋玉仪','周雪梅','郭星星','黄乔珍','吴超','曾淑娴'];
const DIMS=[
  {key:'contrib',   cn:'工作贡献',en:'Work Contribution',ideal:4.5,
   desc:{low:'任务完成质量与主动性有待提升，建议关注时间管理与工作流程。',mid:'工作交付基本稳定，主动性与质量一致性仍有提升空间。',high:'工作贡献突出，能主动高质量完成任务，是团队交付的可靠支柱。'}},
  {key:'collab',    cn:'协作能力',en:'Collaboration',ideal:4.5,
   desc:{low:'同事反映沟通与冲突处理存在明显挑战，这是当前最优先的改进方向。',mid:'团队协作基本顺畅，但处理分歧时的专业度仍有成长空间。',high:'沟通清晰、冲突处理成熟，是团队协作氛围的积极推动者。'}},
  {key:'expertise', cn:'专业能力',en:'Expertise',ideal:4.0,
   desc:{low:'同事认为业务知识与决策质量存在差距，建议加强专业技能培养。',mid:'专业知识达到基础要求，但决策的准确性和深度还有提升空间。',high:'业务知识扎实，决策判断受到认可，是团队的专业参考人。'}},
  {key:'reliability',cn:'可靠性',en:'Reliability',ideal:4.5,
   desc:{low:'承诺兑现率和进度透明度不足，影响团队信任。提高可预期性是当前重点。',mid:'总体可依赖，但偶有承诺落空或沟通不及时，影响团队流畅度。',high:'高度可信赖，说到做到并保持信息透明，是团队稳定性的重要基础。'}},
  {key:'climate',   cn:'团队氛围',en:'Team Climate',ideal:4.0,
   desc:{low:'同事感受到其对团队氛围有负面影响，开放性与情绪管理是最优先改进领域。',mid:'对团队氛围的贡献目前较为中性，更多积极参与和开放态度会受到欢迎。',high:'积极营造包容、尊重的团队文化，对团队凝聚力有重要的正向贡献。'}},
];

let globalAgg={}, totalResp=0, charts={};

function checkPwd(){
  const v=document.getElementById('pwd').value;
  if(v===CORRECT_PWD){
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('csv-screen').style.display='flex';
  } else {
    document.getElementById('login-err').style.display='block';
  }
}

function goBack(){
  document.getElementById('dashboard').style.display='none';
  document.getElementById('csv-screen').style.display='flex';
  Object.values(charts).forEach(c=>c.destroy());
  charts={};
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  const rows=[];
  for(const line of lines){
    // Handle quoted CSV fields properly
    const fields=[];
    let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){fields.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    fields.push(cur.trim());
    rows.push(fields);
  }
  return rows;
}

function parseAndRender(){
  const csv=document.getElementById('csv-input').value.trim();
  if(!csv){document.getElementById('csv-err').style.display='block';return;}
  try{
    const rows=parseCSV(csv);
    if(rows.length<2){throw new Error('no data rows');}
    const header=rows[0].map(h=>h.replace(/^"|"$/g,'').toLowerCase().trim());
    const ratingsCol=header.findIndex(h=>h==='ratings'||h.includes('rating'));
    const sugCol=header.findIndex(h=>h==='suggestions'||h.includes('suggest'));
    if(ratingsCol===-1){throw new Error('no ratings column');}

    // Init aggregation
    const agg={};
    MEMBERS.forEach(m=>{
      agg[m]={scores:{},suggestions:[]};
      DIMS.forEach(d=>{agg[m].scores[`${d.key}_q1`]=[];agg[m].scores[`${d.key}_q2`]=[];});
    });

    let count=0;
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      if(!row[ratingsCol])continue;
      let rStr=row[ratingsCol].trim().replace(/^"|"$/g,'').replace(/""/g,'"');
      let sStr=sugCol>=0?row[sugCol].trim().replace(/^"|"$/g,'').replace(/""/g,'"'):'{}';
      try{
        const r=JSON.parse(rStr);
        const s=JSON.parse(sStr||'{}');
        MEMBERS.forEach(m=>{
          if(r[m]){
            DIMS.forEach(d=>{
              ['q1','q2'].forEach(q=>{
                const v=r[m][`${d.key}_${q}`];
                if(v)agg[m].scores[`${d.key}_${q}`].push(Number(v));
              });
            });
          }
          if(s[m]&&s[m].trim())agg[m].suggestions.push(s[m].trim());
        });
        count++;
      }catch(e){console.warn('row parse error',i,e);}
    }

    if(count===0){throw new Error('no valid rows');}
    globalAgg=agg; totalResp=count;
    document.getElementById('csv-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    renderDashboard();
  }catch(e){
    console.error(e);
    document.getElementById('csv-err').style.display='block';
  }
}

function sColor(s){return s<2.5?'#dc2626':s<3.6?'#d97706':'#059669';}
function sBg(s){return s<2.5?'#fee2e2':s<3.6?'#fef3c7':'#d1fae5';}
function sLabel(s){return s<2?'需立即关注':s<2.5?'低于期望':s<3.6?'达到基本期望':s<4.4?'表现良好':'表现优秀';}
function dimLabel(s){return s<2.5?'low':s<3.6?'mid':'high';}

function dimScore(member,dimKey){
  const sc=globalAgg[member]?.scores;
  if(!sc)return null;
  const all=[...(sc[`${dimKey}_q1`]||[]),...(sc[`${dimKey}_q2`]||[])];
  return all.length?all.reduce((a,b)=>a+b,0)/all.length:null;
}

function personAvg(member){
  const vals=DIMS.map(d=>dimScore(member,d.key)).filter(v=>v!==null);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
}

function renderDashboard(){
  document.getElementById('resp-count').textContent=`已收到 ${totalResp} 份回复`;
  const sorted=[...MEMBERS].sort((a,b)=>personAvg(b)-personAvg(a));
  let html=`<div class="section-title">团队概览 — 点击成员查看详细报告</div>
  <div class="overview-grid">`;
  sorted.forEach((m,i)=>{
    const avg=personAvg(m);
    html+=`<div class="ov-card ${i===0?'active':''}" id="ov-${m}" onclick="showReport('${m}')">
      <div class="ov-avatar">${m[0]}</div>
      <div class="ov-name">${m}</div>
      <div class="ov-score" style="color:${sColor(avg)}">${avg.toFixed(1)}</div>
      <div class="ov-label">${sLabel(avg)}</div>
    </div>`;
  });
  html+=`</div><div id="report-area"></div>`;
  document.getElementById('content').innerHTML=html;
  showReport(sorted[0]);
}

function showReport(member){
  document.querySelectorAll('.ov-card').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('ov-'+member);
  if(card)card.classList.add('active');
  if(charts[member]){charts[member].destroy();delete charts[member];}

  const avg=personAvg(member);
  const sugs=(globalAgg[member]?.suggestions||[]).filter(s=>s&&s.trim());

  let dimRowsHtml='';
  DIMS.forEach(d=>{
    const s=dimScore(member,d.key);
    if(s===null){dimRowsHtml+=`<div style="font-size:13px;color:#9ca3af">${d.cn}：暂无数据</div>`;return;}
    const pct=(s/5)*100;
    const idealPct=(d.ideal/5)*100;
    dimRowsHtml+=`<div>
      <div class="dim-top">
        <div><span class="dim-cn">${d.cn}</span> <span class="dim-en">${d.en}</span></div>
        <span class="dim-val" style="color:${sColor(s)}">${s.toFixed(1)}</span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${pct.toFixed(0)}%;background:${sColor(s)}"></div>
        <div style="position:absolute;right:${(100-idealPct).toFixed(0)}%;top:-3px;bottom:-3px;width:2px;background:#94a3b8" title="理想分 ${d.ideal}"></div>
      </div>
      <div class="dim-interp">${d.desc[dimLabel(s)]}</div>
    </div>`;
  });

  const sugHtml=sugs.length
    ?sugs.map(s=>`<div class="sug-item">"${s}"</div>`).join('')
    :`<div class="sug-empty">暂无同事填写改进建议</div>`;

  document.getElementById('report-area').innerHTML=`
  <div class="report-card">
    <div class="report-header">
      <div class="rep-avatar">${member[0]}</div>
      <div>
        <div class="rep-name">${member}</div>
        <div class="rep-meta">匿名同伴评估 · ${totalResp} 份回复 · 每维度2题均分</div>
      </div>
      <div class="overall-badge">
        <div class="overall-num" style="color:${sColor(avg)}">${avg.toFixed(1)}<span style="font-size:14px;color:#9ca3af"> / 5</span></div>
        <span class="overall-tag" style="background:${sBg(avg)};color:${sColor(avg)}">${sLabel(avg)}</span>
      </div>
    </div>
    <div class="chart-section">
      <div>
        <div style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">五维度雷达图</div>
        <div class="radar-wrap">
          <canvas id="rc-${member}" role="img" aria-label="${member}的五维度评分" style="max-height:240px"></canvas>
        </div>
        <div class="benchmark-note">
          🔵 实际得分 &nbsp;·&nbsp; 🟢 虚线 = 理想目标<br>
          参考目标：工作贡献 ≥4.5 · 协作 ≥4.5 · 专业 ≥4.0 · 可靠性 ≥4.5 · 氛围 ≥4.0
        </div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">维度分项解读</div>
        <div class="dim-scores">${dimRowsHtml}</div>
      </div>
    </div>
    <div class="sug-section">
      <div class="sug-title">📝 同事匿名改进建议</div>
      ${sugHtml}
    </div>
  </div>`;

  setTimeout(()=>{
    const ctx=document.getElementById(`rc-${member}`);
    if(!ctx)return;
    charts[member]=new Chart(ctx,{
      type:'radar',
      data:{
        labels:DIMS.map(d=>d.cn),
        datasets:[
          {label:'实际得分',data:DIMS.map(d=>{const s=dimScore(member,d.key);return s!==null?+s.toFixed(2):0;}),
           backgroundColor:'rgba(37,99,235,0.12)',borderColor:'#2563eb',borderWidth:2,
           pointBackgroundColor:'#2563eb',pointRadius:4,pointHoverRadius:6},
          {label:'理想目标',data:DIMS.map(d=>d.ideal),
           backgroundColor:'rgba(5,150,105,0.06)',borderColor:'#059669',
           borderWidth:1.5,borderDash:[4,4],pointRadius:3,pointBackgroundColor:'#059669',pointStyle:'rectRot'}
        ]
      },
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},boxWidth:12,padding:12,color:'#6b7280'}}},
        scales:{r:{min:0,max:5,ticks:{stepSize:1,color:'#9ca3af',font:{size:10},backdropColor:'transparent'},
          grid:{color:'rgba(0,0,0,.07)'},angleLines:{color:'rgba(0,0,0,.05)'},
          pointLabels:{color:'#374151',font:{size:11,weight:'500'}}}}}
    });
  },50);
}

function exportCSV(){
  const rows=[['姓名','工作贡献','协作能力','专业能力','可靠性','团队氛围','综合均分','评级','建议数量']];
  MEMBERS.forEach(m=>{
    const dims=DIMS.map(d=>{const s=dimScore(m,d.key);return s!==null?s.toFixed(2):'N/A';});
    const avg=personAvg(m);
    const sugs=(globalAgg[m]?.suggestions||[]).filter(s=>s&&s.trim()).length;
    rows.push([m,...dims,avg.toFixed(2),sLabel(avg),sugs]);
  });
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`团队评估报告_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
